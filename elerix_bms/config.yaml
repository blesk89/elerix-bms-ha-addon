name: "Elerix BMS Reader"
description: "RS485 BMS data reader pro Elerix EX-S5 – FoxESS/PACE protokol, LV5200"
version: "2.3.1"
slug: "elerix_bms_reader"
url: "https://github.com/blesk89/elerix-bms-ha-addon"
init: false
uart: true
homeassistant_api: true
startup: "application"
boot: "auto"
arch:
  - aarch64
  - amd64
  - armv7
options:
  port: "/dev/ttyUSB0"
  baudrate: 9600
  packs:
    - addr: 2
      pack_num: 1
    - addr: 2
      pack_num: 2
  interval: 30
  nominal_capacity_ah: 100
schema:
  port: str
  baudrate: int
  packs:
    - addr: int
      pack_num: int
  interval: int
  nominal_capacity_ah: int
